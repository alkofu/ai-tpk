name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Lint markdown
        run: pnpm run lint:md

      - name: Spell check
        run: pnpm run spellcheck

      - name: Format check
        run: pnpm run format:check

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install shfmt
        run: curl -sSfL https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_linux_amd64 -o /usr/local/bin/shfmt && chmod +x /usr/local/bin/shfmt

      - name: Lint shell
        run: pnpm run lint:sh

      - name: Format check shell
        run: pnpm run format:check:sh

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test
