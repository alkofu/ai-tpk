name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.30.3

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Assert lockfile unchanged
        run: git diff --exit-code pnpm-lock.yaml

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format:check

      - name: Bundle freshness check
        run: |
          pnpm run build
          git diff --exit-code dist/installer.js || { echo "::error::dist/installer.js is out of date. Run 'pnpm run build' and commit the result."; exit 1; }

      - name: Test
        run: pnpm test
