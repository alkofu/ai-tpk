name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Lint markdown
        run: pnpm run lint:md

      - name: Spell check
        run: pnpm run spellcheck

      - name: Install yamllint
        run: sudo apt-get install -y yamllint

      - name: Lint YAML
        run: pnpm run lint:yaml

      - name: Format check
        run: pnpm run format:check

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install shfmt
        run: curl -sSfL https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_linux_amd64 -o /usr/local/bin/shfmt && chmod +x /usr/local/bin/shfmt

      - name: Lint shell
        run: pnpm run lint:sh

      - name: Format check shell
        run: pnpm run format:check:sh

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dungeon
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.7"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --locked

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Test (pytest)
        run: uv run pytest
