pre-push:
  commands:
    lint:
      glob: "**/*.{js,jsx,ts,tsx,mjs,cjs}"
      run: pnpm run lint
    format-check:
      glob: "**/*.{js,jsx,ts,tsx,mjs,cjs}"
      run: pnpm run format:check
    lint-md:
      glob: "**/*.md"
      run: pnpm run lint:md
    lint-sh:
      glob: "**/*.sh"
      run: pnpm run lint:sh
    format-check-sh:
      glob: "**/*.sh"
      run: pnpm run format:check:sh
