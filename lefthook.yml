# Note: lint-sh and lint-md run at pre-commit only and over the full file set (pnpm script scope), not just staged files.
pre-commit:
  parallel: true
  commands:
    lint-sh:
      glob: "**/*.sh"
      run: pnpm run lint:sh
    lint-md:
      glob: "**/*.md"
      run: pnpm run lint:md
    ruff-check:
      glob: "dungeon/**/*.py"
      root: dungeon/
      run: uv run ruff check {staged_files}
    ruff-format-check:
      glob: "dungeon/**/*.py"
      root: dungeon/
      run: uv run ruff format --check {staged_files}

pre-push:
  parallel: true
  commands:
    verify-signed-commits:
      use_stdin: true
      run: node scripts/verify-signed-commits-on-push.js
    lint:
      glob: "**/*.{js,jsx,ts,tsx,mjs,cjs}"
      run: pnpm run lint
    format-check:
      glob: "**/*.{js,jsx,ts,tsx,mjs,cjs}"
      run: pnpm run format:check
    lint-yaml:
      glob: "**/*.{yml,yaml}"
      run: pnpm run lint:yaml
    format-check-sh:
      glob: "**/*.sh"
      run: pnpm run format:check:sh
    spellcheck:
      glob: "**/*.{md,ts,sh}"
      run: pnpm run spellcheck
    mypy:
      glob: "dungeon/**/*.py"
      root: dungeon/
      run: uv run mypy src
      skip:
        - merge
        - rebase
    pytest:
      glob: "dungeon/**/*.py"
      root: dungeon/
      run: uv run pytest
      skip:
        - merge
        - rebase
