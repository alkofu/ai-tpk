# Note: lint-sh and lint-md run over the full file set (pnpm script scope), not just staged files.
pre-commit:
  commands:
    lint-sh:
      glob: "**/*.sh"
      run: pnpm run lint:sh
    lint-md:
      glob: "**/*.md"
      run: pnpm run lint:md

pre-push:
  commands:
    lint:
      glob: "**/*.{js,jsx,ts,tsx,mjs,cjs}"
      run: pnpm run lint
    format-check:
      glob: "**/*.{js,jsx,ts,tsx,mjs,cjs}"
      run: pnpm run format:check
    lint-md:
      glob: "**/*.md"
      run: pnpm run lint:md
    lint-sh:
      glob: "**/*.sh"
      run: pnpm run lint:sh
    format-check-sh:
      glob: "**/*.sh"
      run: pnpm run format:check:sh
    spellcheck:
      glob: "**/*.{md,ts,sh}"
      run: pnpm run spellcheck
